# Extends the upstream gazebo_controller_manager.yaml with diff_drive so the
# mobile base can move via ros2_control when the Gazebo diff-drive plugin fails
# to attach (common after spawn_entity on The Construct).
controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 1000

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    imu_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: position_controllers/GripperActionController

diff_drive_controller:
  ros__parameters:
    use_sim_time: true
    left_wheel_names: ["wheel_left_joint"]
    right_wheel_names: ["wheel_right_joint"]
    wheel_separation: 0.287
    wheel_radius: 0.033
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    open_loop: true
    enable_odom_tf: true
    cmd_vel_timeout: 0.5
    use_stamped_vel: false
    linear.x.max_velocity: 0.26
    linear.x.min_velocity: -0.26
    angular.z.max_velocity: 1.82
    angular.z.min_velocity: -1.82

imu_broadcaster:
  ros__parameters:
    use_sim_time: true
    frame_id: imu_link
    sensor_name: imu

arm_controller:
  ros__parameters:
    use_sim_time: true
    joints: [joint1, joint2, joint3, joint4]
    interface_name: position
    command_interfaces: [position]
    state_interfaces: [position, velocity]
    state_publish_rate: 200.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    open_loop_control: true
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0

gripper_controller:
  ros__parameters:
    use_sim_time: true
    joint: gripper_left_joint
