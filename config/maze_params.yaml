# Mission parameters consumed by maze_navigator and friends.
# All grid coordinates use (row, col) with row 1 = south, col 1 = west.

maze_navigator:
  ros__parameters:
    # Start and goal cells (target_cell = drop-off).
    start_cell: [1, 3]
    target_cell: [1, 7]
    # Initial yaw at spawn: pi/2 = facing +Y (north / into the maze).
    start_heading_rad: 1.5708

    # Maze geometry.
    cell_size_m: 0.5
    rows: 7
    cols: 7

    # Locomotion limits (cell-by-cell movement).
    linear_speed: 0.10        # m/s during forward travel
    angular_speed: 0.5        # rad/s during in-place rotation
    forward_tolerance_m: 0.01 # stop band when odometry reaches +0.5 m
    angular_tolerance_rad: 0.02

    # LIDAR-based forward safety and corridor centering.
    front_safety_dist_m: 0.20       # abort forward if F-range drops below this
    front_slow_dist_m: 0.30         # below this, scale speed down toward 0.3x
    centering_gain: 1.2             # P-gain on (L-R) range error -> ang.z
    max_centering_ang: 0.30         # rad/s clamp on the centering correction
    centering_max_side_dist_m: 0.32 # only center if both sides see a wall within this

    # FSM behaviour
    max_explore_steps: 80     # safety cap on BFS expansion iterations
    object_pickup_offset_m: 0.15  # approach this far in front of object cell

lidar_processor:
  ros__parameters:
    # Sector definitions (deg, inclusive lower / exclusive upper)
    front_min_deg: -30.0
    front_max_deg:  30.0
    right_min_deg:  60.0
    right_max_deg: 120.0
    back_min_deg: 150.0
    back_max_deg: 210.0
    left_min_deg: 240.0
    left_max_deg: 300.0

    wall_threshold_m: 0.25    # distance below which we declare wall in a sector
    min_valid_range_m: 0.06   # below this is sensor noise
    max_valid_range_m: 3.50   # outside the maze; treat as no return

    # Object detection (matches 2cm x 20cm cube profile)
    object_cluster_min_points: 2
    object_cluster_max_points: 10
    object_cluster_max_width_m: 0.06
    object_min_distance_m: 0.08
    object_max_distance_m: 0.45

grid_mapper:
  ros__parameters:
    rows: 7
    cols: 7
    publish_period_s: 0.5

path_planner:
  ros__parameters:
    rows: 7
    cols: 7

standalone_navigator:
  ros__parameters:
    use_sim_time: true

manipulator_controller:
  ros__parameters:
    # OpenManipulator-X joint goals (radians) for each pose.
    home_joints:     [0.0, -1.05,  0.35,  0.70]
    reach_joints:    [0.0,  0.20,  0.30, -0.50]
    lower_joints:    [0.0,  0.60,  0.10, -0.70]
    carry_joints:    [0.0, -0.90,  0.30,  0.60]
    gripper_open:    0.044
    gripper_close:   0.010
    step_wait_s:     1.0   # shorter waits in Gazebo stub mode
